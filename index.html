<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الأجهزة - السودان</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .card-product { border: none; border-radius: 15px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-product:hover { transform: translateY(-5px); }
        .btn-verify { background-color: #27ae60; color: white; border-radius: 20px; }
        .price-tag { color: #e67e22; font-weight: bold; font-size: 1.1rem; }
        .badge-verified { background-color: #3498db; font-size: 0.75rem; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top p-3 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">سيدا | SiedaApp</a>
            <button class="btn btn-outline-light btn-sm px-3" data-bs-toggle="modal" data-bs-target="#verifyModal">توثيق الحساب</button>
        </div>
    </nav>

    <header class="bg-white py-4 mb-4 shadow-sm border-bottom">
        <div class="container text-center">
            <h2 class="mb-3 fw-bold">ابحث عن جهازك القادم</h2>
            <div class="input-group mb-3 w-75 mx-auto">
                <input type="text" id="searchInput" class="form-control" placeholder="مثلاً: آيفون 15، شاشة سامسونج...">
                <button class="btn btn-primary px-4 btn-search" type="button">بحث</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row g-4" id="productsContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">جاري التحميل...</span>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="verifyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">توثيق الحساب (بائع موثوق)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <div class="mb-3">
                        <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
                    </div>
                    <p class="text-muted">لضمان الأمان ومصداقية الإعلانات، يرجى رفع فيديو مدته 10 ثوانٍ يظهر هويتك أو المحل الخاص بك.</p>
                    <input type="file" id="videoInput" accept="video/*" class="form-control mb-3">
                    <button class="btn btn-verify w-100 py-2 fw-bold btn-submit-verify">إرسال للتدقيق</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
